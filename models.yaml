# ─────────────────── ANTHROPIC ───────────────────
- name: Anthropic
  company: anthropic
  tagline: "poetry-themed tiers, jazz-improvised versioning"
  children:
    - name: Claude 1
      date: "Mar 2023"
      url: "https://www.anthropic.com/news/introducing-claude"
      tip: "<strong>First Claude.</strong> Available to selected users only."
      children:
        - name: Claude Instant 1
          dead: true
          url: "https://www.anthropic.com/news/introducing-claude"
          tip: "<strong>The fast tier before Haiku existed.</strong> 'Instant' was the budget option. Later replaced by Haiku."
        - name: Claude Instant 1.2
          dead: true
          date: "Aug 2023"
          url: "https://www.anthropic.com/news/releasing-claude-instant-1-2"
          tip: "Improved math and coding."
    - name: Claude 2
      date: "Jul 2023"
      url: "https://www.anthropic.com/news/claude-2"
      tip: "<strong>First publicly available Claude.</strong>"
      children:
        - name: Claude 2.1
          date: "Nov 2023"
          url: "https://www.anthropic.com/news/claude-2-1"
          tip: "200K token context window."
    - name: Claude 3
      date: "Mar 2024"
      url: "https://www.anthropic.com/news/claude-3-family"
      tip: "<strong>Introduced the poetry tier system.</strong> Haiku (small) / Sonnet (medium) / Opus (large). Each named after a poetic form, ordered by length."
      children:
        - name: Haiku
          url: "https://www.anthropic.com/news/claude-3-haiku"
          tip: "<strong>Smallest, fastest.</strong> Named after the 3-line Japanese poem form. Short poem = small model."
        - name: Sonnet
          url: "https://www.anthropic.com/news/claude-3-family"
          tip: "<strong>Balanced middle tier.</strong> Named after the 14-line poem. Medium poem = medium model."
        - name: Opus
          url: "https://www.anthropic.com/news/claude-3-family"
          tip: "<strong>Largest, most capable.</strong> Named after a major musical/literary work. Big work = big model."
    - name: Claude 3.5
      date: "Jun 2024"
      url: "https://www.anthropic.com/news/claude-3-5-sonnet"
      tip: "Half-version. Only Sonnet and Haiku shipped."
      children:
        - name: Sonnet
          date: "Jun 2024"
          url: "https://www.anthropic.com/news/claude-3-5-sonnet"
          tip: "<strong>Two versions with the same name.</strong> Original in June, updated in October. Model ID: claude-3-5-sonnet-20241022."
          children:
            - name: Sonnet (Oct update)
              date: "Oct 2024"
              url: "https://www.anthropic.com/news/3-5-models-and-computer-use"
              tip: "Updated version. Same name. Different model ID date stamp. Introduced 'computer use' capability."
        - name: Haiku
          date: "Oct 2024"
          url: "https://www.anthropic.com/news/3-5-models-and-computer-use"
        - name: Opus
          dead: true
          note: "announced as a tier, never shipped"
          tip: "<strong>Never shipped.</strong> Everyone expected Claude 3.5 Opus. It was listed as a tier. It never came out."
    - name: Claude 3.6
      dead: true
      note: "does not exist"
      tip: "<strong>Skipped.</strong> No 3.6 was ever released or announced."
    - name: Claude 3.7 Sonnet
      date: "Feb 2025"
      note: "jumped 3.5 to 3.7, Sonnet only"
      url: "https://www.anthropic.com/news/claude-3-7-sonnet"
      tip: "<strong>First hybrid reasoning model.</strong> Visible thinking. Only Sonnet. No Haiku, no Opus. Version 3.7 exists between 3.5 and 4."
    - name: Claude 4
      date: "May 2025"
      url: "https://www.anthropic.com/news/claude-4"
      tip: "Major version bump. No Haiku 4."
      children:
        - name: Sonnet 4
          url: "https://www.anthropic.com/news/claude-4"
          tip: "Mid-tier."
        - name: Opus 4
          url: "https://www.anthropic.com/news/claude-4"
          tip: "Top-tier. Opus returns."
        - name: Haiku 4
          dead: true
          note: "doesn't exist, jumps to 4.5"
          tip: "<strong>No Haiku 4.</strong> Haiku skips from 3.5 to 4.5."
    - name: Claude 4.5
      date: "Sep 2025"
      url: "https://www.anthropic.com/news/claude-sonnet-4-5"
      tip: "All three tiers return."
      children:
        - name: Sonnet 4.5
          date: "Sep 2025"
          url: "https://www.anthropic.com/news/claude-sonnet-4-5"
        - name: Haiku 4.5
          date: "Oct 2025"
          note_dim: "Haiku is back from the dead"
          url: "https://www.anthropic.com/news/claude-haiku-4-5"
        - name: Opus 4.5
          date: "Nov 2025"
          url: "https://www.anthropic.com/news/claude-opus-4-5"
    - name: Claude 4.6
      date: "Feb 2026"
      url: "https://www.anthropic.com/news/claude-opus-4-6"
      tip: "1M token context (beta). Tier system remains intermittent."
      children:
        - name: Opus 4.6
          date: "Feb 2026"
          url: "https://www.anthropic.com/news/claude-opus-4-6"
          tip: "<strong>Opus shipped first.</strong> Introduces 'agent teams' — agents that spawn sub-agents. Found 500+ zero-day vulnerabilities during testing. #1 on GDPVAL-AA leaderboard."
        - name: Sonnet 4.6
          date: "Feb 2026"
          url: "https://www.anthropic.com/news/claude-sonnet-4-6"
          tip: "<strong>Sonnet catches up.</strong> Same pricing as Sonnet 4.5 ($3/$15 per million tokens). Users preferred it over Opus 4.5 ~59% of the time. Enhanced coding, computer use, and long-context reasoning. Top of GDPVAL-AA alongside Opus 4.6."
    - name: Claude 4.7
      date: "Apr 2026"
      url: "https://www.anthropic.com/news/claude-opus-4-7"
      tip: "Opus-only point release. No Sonnet 4.7, no Haiku 4.7 — at least not yet."
      children:
        - name: Opus 4.7
          date: "Apr 2026"
          url: "https://www.anthropic.com/news/claude-opus-4-7"
          note: "same price as 4.6"
          tip: "<strong>First Opus upgrade that doesn't raise the price.</strong> 87.6% on SWE-bench Verified. 2x agentic throughput, 3.75MP vision, 1M context, new tokenizer. Stays at $5/$25 per M tokens. Ships with real-time cybersecurity refusal safeguards."
        - name: Claude Design
          date: "Apr 2026"
          url: "https://www.anthropic.com/news/claude-design-anthropic-labs"
          note: "product, powered by Opus 4.7"
          tip: "<strong>Design tool, not a model.</strong> Anthropic Labs product built on Opus 4.7. Prototypes, slides, one-pagers. Reads your codebase to build a design system. Exports to Canva/PDF/PPTX. Labs is becoming a full application shop."
    - name: Claude Mythos Preview
      date: "Apr 2026"
      url: "https://red.anthropic.com/2026/mythos-preview/"
      note: "not GA — Project Glasswing only"
      tip: "<strong>A class above Opus 4.7.</strong> Used internally to find thousands of zero-days across every major OS and browser, plus a 17-year-old RCE in FreeBSD (CVE-2026-4747). Available only to ~50 launch partners via Project Glasswing. 'Mythos' because naming models after Greek/occult concepts is how you signal danger."

