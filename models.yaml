- name: "Alibaba / Qwen"
  company: alibaba
  tagline: "China's biggest cloud went open-source, versioned everything twice"
  children:
    - name: "Qwen (\u901A\u4E49\u5343\u95EE)"
      date: "Aug 2023"
      url: "https://qwenlm.github.io/blog/qwen/"
