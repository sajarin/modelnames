      date: "Jun 2025"
      url: "https://machinelearning.apple.com/research/apple-foundation-models-2025-updates"
      tip: "<strong>Updated generation.</strong> Direct API access via Foundation Models framework. Still no fun names."
    - name: Foundation Models (iOS 26.4)
      date: "Mar 2026"
      url: "https://developer.apple.com/hello/march26/"
      note: "versioned by the OS, not the model"
      tip: "<strong>Instruction-following and tool-calling upgrade.</strong> Apple still doesn't give its model a name — it versions by iOS release (26.4). New Python bindings ship alongside. A model you refer to by the device firmware that contains it."

