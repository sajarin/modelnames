      date: "Apr 2025"
      url: "https://qwenlm.github.io/blog/qwen3/"
      tip: "<strong>Latest generation.</strong> Dense and MoE variants. Hybrid thinking modes."
      children:
        - name: Qwen3-235B-A22B
          url: "https://qwenlm.github.io/blog/qwen3/"
          note: "MoE naming in the model ID"
          tip: "<strong>235B total, 22B active.</strong> Name format: Qwen3 + total params + A(ctive) + active params."
        - name: Qwen3-32B
          url: "https://qwenlm.github.io/blog/qwen3/"
        - name: Qwen3-8B
          url: "https://qwenlm.github.io/blog/qwen3/"
        - name: Qwen3-4B
          url: "https://qwenlm.github.io/blog/qwen3/"
        - name: Qwen3-0.6B
          url: "https://qwenlm.github.io/blog/qwen3/"
        - name: Qwen3-Max
          date: "Sep 2025"
          url: "https://qwenlm.github.io/blog/qwen3/"
          tip: "The MoE flagship."
        - name: Qwen3-Omni
          date: "Sep 2025"
          url: "https://qwenlm.github.io/blog/qwen3/"
          note: "text, images, audio, video"
          tip: "<strong>Multimodal everything.</strong> Generates text, images, audio, and video. 'Omni' borrowed from OpenAI's GPT-4o naming."
        - name: Qwen3 Max Thinking
          date: "Jan 2026"
          url: "https://qwenlm.github.io/blog/qwen3/"
          note: "reasoning variant"
          tip: "<strong>Reasoning mode for the Max model.</strong> 'Max' from the MoE line + 'Thinking' for reasoning. Alibaba's naming now has: version + size + architecture + capability."
        - name: Qwen3 Coder Next
          date: "Feb 2026"
          url: "https://qwenlm.github.io/blog/qwen3/"
          note: "'Next' is a tier now??"
          tip: "<strong>'Next' as a variant name.</strong> Not V2, not Plus, not Pro. 'Next.' The word that means 'the one after this one.'"
    - name: Qwen3.5
      date: "Feb 2026"
      note: "the 'Medium Model Series'"
      url: "https://qwen.ai/blog?id=qwen3.5"
      tip: "<strong>The 'Medium Model Series.'</strong> Hybrid architecture: Gated Delta Networks (linear attention) + standard Gated Attention. Apache 2.0."
      children:
        - name: Qwen3.5 small sizes
          date: "Mar 2026"
          url: "https://medium.com/data-science-in-your-pocket/qwen-3-5-small-model-series-released-7a5ed34fcbb3"
          note: "9B, 4B, 2B, 0.8B"
          tip: "<strong>Four more sizes, all released on a single day (Mar 2).</strong> Qwen now ships at 0.8B, 2B, 4B, 9B, 27B, 35B-A3B, 122B-A10B, 397B-A17B. Eight sizes in one version."
        - name: Qwen3.5-27B
          url: "https://qwen.ai/blog?id=qwen3.5"
          tip: "Dense model. 27B all active. Runs on consumer GPUs with 4-bit quantization (~14GB VRAM)."
        - name: Qwen3.5-35B-A3B
          url: "https://qwen.ai/blog?id=qwen3.5"
          note: "35B total, 3B active"
          tip: "<strong>Outperforms the 235B flagship with 7x fewer active params.</strong> Sparse MoE. 262K context, extensible to 1M. The 'medium' model that beats the 'large' model."
        - name: Qwen3.5-122B-A10B
          url: "https://qwen.ai/blog?id=qwen3.5"
          note: "122B total, 10B active"
          tip: "Largest in the Medium series. 1M+ context."
        - name: Qwen3.5-Flash
          url: "https://qwen.ai/blog?id=qwen3.5"
          note: "proprietary, API-only"
          tip: "The one they don't open-source. Because every open-source company needs a proprietary model."
        - name: Qwen3.5-Omni
          date: "Mar 2026"
          url: "https://qwenlm.github.io/"
          note: "Omni returns"
          tip: "Multimodal 'Omni' revision. Alibaba now has Qwen3-Omni AND Qwen3.5-Omni — separate lineages from a 6-month span."
    - name: Qwen3.6
      date: "Mar 2026"
      note: "skipped no version, promise"
      url: "https://github.com/QwenLM/Qwen3.6"
      tip: "<strong>1M context window, always-on chain-of-thought.</strong> Qwen 3 had Plus, Max, Next, Omni. Qwen 3.5 was the Medium Model Series. Qwen 3.6 is... a different version number with 'Plus' again."
      children:
        - name: Qwen3.6 Plus Preview
          date: "Mar 2026"
          url: "https://www.buildfastwithai.com/blogs/qwen-3-6-plus-preview-review"
          note: "1M context, free on OpenRouter"
          tip: "<strong>1M token context, 65K output.</strong> Always-on reasoning, native function calling. Ships as 'Preview' and 'Plus' simultaneously."
        - name: Qwen3.6-35B-A3B
          date: "Apr 2026"
          url: "https://github.com/QwenLM/Qwen3.6"
          note: "35B total, 3B active"
          tip: "Sparse MoE. The 35B-A3B format is now standard Qwen — same spec class as Qwen3.5-35B-A3B. Two models, same shape, different version number."
    - name: Media
      section: true
      children:
        - name: Wan
          url: "https://www.alibabacloud.com/blog/alibaba-unveils-its-latest-open-source-video-generation-model_602167"
          tip: "<strong>Wanxiang, Alibaba's text-to-video and image-to-video family.</strong> Abbreviated 'Wan.' No relation to Qwen, same parent company."
          children:
            - name: Wan 2.6
              date: "Mar 2026"
              url: "https://www.alibabacloud.com/blog/alibaba-unveils-wan2-6-series-enabling-everyone-to-star-in-videos_602742"
              tip: "Character-reference video series."
            - name: Wan 2.7
              date: "Apr 2026"
              url: "https://www.alibabacloud.com/blog/alibaba-unveils-its-latest-open-source-video-generation-model_602167"
              note: "Thinking Mode, in a video model"
              tip: "<strong>'Thinking Mode' in a video generator.</strong> Plans composition before generating. Includes Wan2.7-Video and Wan2.7-Image. Reasoning-model suffixes are leaking into media models now."

